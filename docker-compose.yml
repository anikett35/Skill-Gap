version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: skillgap_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skillgap_v3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillgap_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: skillgap_v3
      GROQ_API_KEY: ${GROQ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production
      # Fix: comma-separated for pydantic-settings List[str]
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,https://skill-gap-seven.vercel.app,https://skill-gap-mtzv.onrender.com"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillgap_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      # Fix: Vite requires VITE_ prefix; this is baked at build time via ARG
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  mongo_data:
